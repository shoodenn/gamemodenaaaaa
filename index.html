<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>しょーでんゲームズ</title>
    <style>
        /* ページ全体のスタイル（中央ぞろえ） */
        body {
            text-align: center;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background-color: #f8f9fa; /* 背景色（少し優しい白） */
            color: #333; /* 文字の色 */
            margin-top: 50px;
        }

        /* 一番上のでっかい文字 */
        .header-title {
            font-size: 3.5rem; /* かなり大きめに設定 */
            font-weight: bold;
            margin-bottom: 30px;
        }

        /* ゲームタイトル */
        .game-title {
            font-size: 2rem;
            font-weight: bold;
            color: #0056b3; /* 少し色をつけて目立たせる */
            margin-bottom: 20px;
        }

        /* ゲームの説明エリア */
        .game-description {
            font-size: 1.2rem;
            line-height: 1.6;
            width: 80%;
            max-width: 600px; /* 横に広がりすぎないように制限 */
            margin: 0 auto; /* 説明ブロック自体を画面の中央に配置 */
            padding: 20px;
            background-color: #ffffff;
            border: 2px solid #ddd;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- 一番上の文字 -->
    <div class="header-title">しょーでんが作った<br>ブラウザゲーム</div>

    <!-- ゲームタイトル（ここを書き換えてください） -->
    <div class="game-title">ここにゲームタイトルを書く</div>

    <!-- ゲームの説明（ここを書き換えてください） -->
    <div class="game-description">
        <p>ここにゲームの説明を書きます。</p>
        <p>どんなゲームなのか、操作方法、アピールポイントなどを自由に書いてみてください！</p>
    </div>

</body>
</html>
