<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シューティングゲーム</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #222;
        }

        canvas {
            /* ドット絵をぼやけさせずに拡大する魔法のCSS（互換性強化） */
            image-rendering: -webkit-optimize-contrast; /* 古い Safari, Chrome 用 */
            image-rendering: -moz-crisp-edges;       /* 古い Firefox 用 */
            image-rendering: -o-crisp-edges;         /* 古い Opera 用 */
            image-rendering: crisp-edges;           /* 標準（将来用） */
            image-rendering: pixelated;             /* 最新ブラウザ標準 */
            
            /* 画面をもっとでかく！ 400px -> 800px に変更 */
            width: 800px;  
            height: 800px; 
            background-color: #000;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="100" height="100"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- 1. 画像素材の読み込み（パスを ../images/ に修正） ---
        const bgImg = new Image();
        bgImg.src = '../images/haikei.png'; // 「../」をつけて1つ外のフォルダを見に行く

        const playerImg = new Image();
        playerImg.src = '../images/zibunn.png';

        const bulletImg = new Image();
        bulletImg.src = '../images/tama.png';

        // --- 2. キャラクターと弾の設定 ---
        const player = {
            x: 45, 
            y: 80, 
            width: 10,  
            height: 10, 
            speed: 2    
        };

        let bullets = [];

        const keys = {
            w: false,
            a: false,
            s: false,
            d: false,
            Enter: false
        };

        let lastFireTime = 0;
        const fireRate = 150; 

        // --- 3. キーボード入力の監視 ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'W') keys.w = true;
            if (e.key === 'a' || e.key === 'A') keys.a = true;
            if (e.key === 's' || e.key === 'S') keys.s = true;
            if (e.key === 'd' || e.key === 'D') keys.d = true;
            if (e.key === 'Enter') keys.Enter = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'w' || e.key === 'W') keys.w = false;
            if (e.key === 'a' || e.key === 'A') keys.a = false;
            if (e.key === 's' || e.key === 'S') keys.s = false;
            if (e.key === 'd' || e.key === 'D') keys.d = false;
            if (e.key === 'Enter') keys.Enter = false;
        });

        // --- 4. ゲームの更新処理 ---
        function update() {
            if (keys.w && player.y > 0) player.y -= player.speed;
            if (keys.s && player.y < canvas.height - player.height) player.y += player.speed;
            if (keys.a && player.x > 0) player.x -= player.speed;
            if (keys.d && player.x < canvas.width - player.width) player.x += player.speed;

            if (keys.Enter) {
                const now = Date.now();
                if (now - lastFireTime > fireRate) {
                    // 弾の発射ロジックを修正（配列の先頭に追加）
                    bullets.unshift({ 
                        x: player.x + (player.width / 2) - 2, 
                        y: player.y,
                        width: 4,  
                        height: 4, 
                        speed: 3   
                    });
                    lastFireTime = now;
                }
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y + bullets[i].height < 0) {
                    bullets.splice(i, 1);
                }
            }
        }

        // --- 5. 画面への描画処理 ---
        function draw() {
            if (bgImg.complete && bgImg.naturalWidth !== 0) {
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height); 
            }

            if (bulletImg.complete && bulletImg.naturalWidth !== 0) {
                bullets.forEach(b => {
                    ctx.drawImage(bulletImg, b.x, b.y, b.width, b.height);
                });
            }

            if (playerImg.complete && playerImg.naturalWidth !== 0) {
                ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
            }
        }

        // --- 6. ゲームループ ---
        // 描画時の補間を無効にする（ここを追加）
        ctx.imageSmoothingEnabled = false; 

        function gameLoop() {
            update(); 
            draw();   
            requestAnimationFrame(gameLoop); 
        }

        // 全ての画像が読み込まれてからゲームループを開始するようにする（安全のため）
        let loadedCount = 0;
        const checkImagesLoaded = () => {
            loadedCount++;
            if (loadedCount === 3) {
                gameLoop();
            }
        };

        bgImg.onload = checkImagesLoaded;
        playerImg.onload = checkImagesLoaded;
        bulletImg.onload = checkImagesLoaded;
        
        // 画像がキャッシュされている場合はonloadが呼ばれないことがあるため、
        // gameLoop()は一度だけ実行されるようにする。
        if (bgImg.complete && playerImg.complete && bulletImg.complete) {
            gameLoop();
        }

    </script>
</body>
</html>
