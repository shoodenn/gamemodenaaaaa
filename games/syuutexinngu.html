<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シューティングゲーム</title>
    <style>
        /* 画面全体の余白をなくし、背景を黒にする */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #222; /* 画面外の背景色 */
            overflow: hidden; /* スクロールバーが出ないようにする */
        }

        /* 画面の短い方に合わせて正方形を最大化する */
        canvas {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: crisp-edges;
            image-rendering: pixelated; /* ドットをくっきりさせる */
            
            /* ▼ ここがポイント！ vmin を使う ▼ */
            width: 100vmin;  
            height: 100vmin; 
            max-width: 100vw; /* 横幅の最大値は画面幅まで */
            max-height: 100vh; /* 高さの最大値は画面の高さまで */

            background-color: #000;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="100" height="100"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- 画像素材の読み込み ---
        const bgImg = new Image();
        bgImg.src = '../images/haikei.png';

        const playerImg = new Image();
        playerImg.src = '../images/zibunn.png';

        const bulletImg = new Image();
        bulletImg.src = '../images/tama.png';

        // --- キャラクターと弾の設定 ---
        const player = {
            x: 45, 
            y: 80, 
            width: 10,  
            height: 10, 
            speed: 1    
        };

        let bullets = [];

        const keys = {
            w: false,
            a: false,
            s: false,
            d: false,
            Enter: false
        };

        let lastFireTime = 0;
        const fireRate = 150; 

        // --- キーボード入力の監視 ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'W') keys.w = true;
            if (e.key === 'a' || e.key === 'A') keys.a = true;
            if (e.key === 's' || e.key === 'S') keys.s = true;
            if (e.key === 'd' || e.key === 'D') keys.d = true;
            if (e.key === 'Enter') keys.Enter = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'w' || e.key === 'W') keys.w = false;
            if (e.key === 'a' || e.key === 'A') keys.a = false;
            if (e.key === 's' || e.key === 'S') keys.s = false;
            if (e.key === 'd' || e.key === 'D') keys.d = false;
            if (e.key === 'Enter') keys.Enter = false;
        });

        // --- ゲームの更新処理 ---
        function update() {
            if (keys.w && player.y > 0) player.y -= player.speed;
            if (keys.s && player.y < canvas.height - player.height) player.y += player.speed;
            if (keys.a && player.x > 0) player.x -= player.speed;
            if (keys.d && player.x < canvas.width - player.width) player.x += player.speed;

            if (keys.Enter) {
                const now = Date.now();
                if (now - lastFireTime > fireRate) {
                    bullets.unshift({ 
                        x: player.x + (player.width / 2) - 2, 
                        y: player.y,
                        width: 4,  
                        height: 4, 
                        speed: 3   
                    });
                    lastFireTime = now;
                }
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y + bullets[i].height < 0) {
                    bullets.splice(i, 1);
                }
            }
        }

        // --- 画面への描画処理 ---
        function draw() {
            if (bgImg.complete && bgImg.naturalWidth !== 0) {
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height); 
            }

            if (bulletImg.complete && bulletImg.naturalWidth !== 0) {
                bullets.forEach(b => {
                    ctx.drawImage(bulletImg, b.x, b.y, b.width, b.height);
                });
            }

            if (playerImg.complete && playerImg.naturalWidth !== 0) {
                ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
            }
        }

        // --- ゲームループ ---
        ctx.imageSmoothingEnabled = false; 

        function gameLoop() {
            update(); 
            draw();   
            requestAnimationFrame(gameLoop); 
        }

        let loadedCount = 0;
        const checkImagesLoaded = () => {
            loadedCount++;
            if (loadedCount === 3) {
                gameLoop();
            }
        };

        bgImg.onload = checkImagesLoaded;
        playerImg.onload = checkImagesLoaded;
        bulletImg.onload = checkImagesLoaded;
        
        if (bgImg.complete && playerImg.complete && bulletImg.complete) {
            gameLoop();
        }

    </script>
</body>
</html>
